    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            height: calc(100vh - 80px);
        }

        .flight-icon {
            font-size: 36px;
            font-weight: 600;
            user-select: none;
            color: #006937 !important;
            /* solid green */
        }

        /* Landmark icons container */
        .landmark-icon {
            width: 48px;
            height: 48px;
            pointer-events: none;
            /* Disable interaction so no popups */
            user-select: none;
        }

        /* Custom twin towers icon */
        .twin-towers {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            height: 48px;
        }

        .tower {
            width: 12px;
            height: 40px;
            background: #333;
            border-radius: 2px;
            box-shadow: 0 0 4px #666;
        }
    </style>
</head>

<body>

                    </div>
                    <div class="uk-navbar-center">
                        <div class="uk-navbar-nav">
                            <ul class="uk-navbar-nav">
                                <li>
                                    <a href="destinations.html" class="nav-border uk-text-capitalize nav-item-custom">Destinace</a>
                                </li>
                                <li><a href="#" class="nav-border uk-text-capitalize nav-item-custom">Naše flotila</a></li>
                                <li><a href="#" class="nav-border uk-text-capitalize nav-item-custom">Naše flotila</a></li>
                                <li><a href="#" class="nav-border uk-text-capitalize nav-item-custom">Naše flotila</a></li>
                                <li>
                                    <a href="about_us.html" class="nav-border uk-text-capitalize nav-item-custom">O nás</a>
                                </li>

                    <div class="uk-navbar-right uk-margin-medium-right">
                        <div class="uk-navbar-nav">
                            <ul class="uk-navbar-nav uk-flex">

    <div id="map"></div>

    <!-- UIkit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.23.9/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.23.9/dist/js/uikit-icons.min.js"></script>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            zoomControl: false
        }).setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function addLandmark(lat, lng, html) {
            const icon = L.divIcon({
                html: html,
                className: '',
                iconSize: [48, 48],
                iconAnchor: [24, 48],
                popupAnchor: [0, -48]
            });
            L.marker([lat, lng], { icon: icon, interactive: false }).addTo(map);
        }

        const twinTowersHTML = `
        <div class="landmark-icon twin-towers">
          <div class="tower"></div>
          <div class="tower"></div>
        </div>`;

        addLandmark(40.7128, -74.0060, twinTowersHTML);

        const eiffelTowerHTML = `
        <div class="landmark-icon" style="font-size:48px; line-height:48px; text-align:center;">
          🗼
        </div>`;

        addLandmark(48.8566, 2.3522, eiffelTowerHTML);

        let markers = [];

        async function loadFlights() {
            try {
                const url = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://opensky-network.org/api/states/all');
                const response = await fetch(url);
                const wrappedData = await response.json();
                const data = JSON.parse(wrappedData.contents);

                if (!data.states) {
                    console.log('No states data returned');
                    return;
                }

                markers.forEach(m => map.removeLayer(m));
                markers.length = 0;

                // Filter PIA and RYR flights with valid lat/lon
                const filteredFlights = data.states.filter(f => {
                    if (!f[1]) return false;
                    const callsign = f[1].trim().toUpperCase();
                    return (callsign.startsWith("PIA") || callsign.startsWith("RYR")) &&
                        typeof f[5] === 'number' && !isNaN(f[5]) &&
                        typeof f[6] === 'number' && !isNaN(f[6]);
                });

                console.log('Total flights:', data.states.length);
                console.log('PIA & RYR flights found:', filteredFlights.length);

                filteredFlights.forEach(flight => {
                    const callsign = flight[1].trim();
                    const lat = flight[6];
                    const lon = flight[5];
                    const alt = flight[7];
                    const spd = flight[9];

                    const icon = L.divIcon({
                        html: `<span class="material-symbols-outlined flight-icon">flight</span>`,
                        className: '',
                        iconSize: [36, 36],
                        iconAnchor: [18, 18],
                        popupAnchor: [0, -18],
                    });

                    const marker = L.marker([lat, lon], { icon: icon }).addTo(map);
                    marker.bindPopup(`
                        <strong>${callsign}</strong><br>
                        Altitude: ${alt ? Math.round(alt) + ' m' : 'N/A'}<br>
                        Speed: ${spd ? Math.round(spd) + ' m/s' : 'N/A'}
                    `);
                    markers.push(marker);
                });
            } catch (e) {
                console.error('Error loading flights:', e);
            }
        }

        loadFlights();
        setInterval(loadFlights, 30000);
    </script>
</body>

</html>
